    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { background: #04080f; overflow-x: hidden; }
      #root { min-height: 100vh; }

      /* ── Boot / Loading Screen ─────────────────────────────── */
      #boot {
        position: fixed;
        inset: 0;
        background: #04080f;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        gap: 20px;
        transition: opacity 0.5s ease;
      }
      #boot.out { opacity: 0; pointer-events: none; }

      .bl {
        font-family: 'Orbitron', sans-serif;
        font-size: 32px;
        font-weight: 900;
        color: #00e5ff;
        letter-spacing: 8px;
        animation: bootGlow 1.5s ease-in-out infinite alternate;
      }

      .bw {
        width: 220px;
        height: 2px;
        background: rgba(0, 229, 255, 0.1);
        border-radius: 2px;
        overflow: hidden;
      }

      .bb {
        height: 100%;
        background: #00e5ff;
        border-radius: 2px;
        animation: bootFill 1.3s ease forwards;
        box-shadow: 0 0 10px #00e5ff;
      }

      .bt {
        font-family: 'Share Tech Mono', monospace;
        font-size: 11px;
        letter-spacing: 3px;
        color: rgba(0, 229, 255, 0.5);
        animation: bootBlink 0.8s step-end infinite;
      }

      @keyframes bootGlow {
        from { text-shadow: 0 0 20px rgba(0, 229, 255, 0.3); }
        to   { text-shadow: 0 0 60px rgba(0, 229, 255, 0.8); }
      }
      @keyframes bootFill {
        from { width: 0; }
        to   { width: 100%; }
      }
      @keyframes bootBlink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0; }
      }
    </style>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <!-- Boot Screen -->
    <div id="boot">
      <div class="bl">KHAIRULHUB</div>
      <div class="bw"><div class="bb"></div></div>
      <div class="bt">INITIALIZING SYSTEM...</div>
    </div>

    <div id="root"></div>

    <script>
      window.addEventListener('load', function () {
        setTimeout(function () {
          var b = document.getElementById('boot');
          if (b) {
            b.classList.add('out');
            setTimeout(function () { b.remove(); }, 500);
          }
        }, 1500);
      });
    </script>
  </body>
